        /* КНОПКА ОТКРЫТЬ КАРТУ */
        .map-button {

            font-size: 14px;

.calendar-wrapper {
    width: 100%;

    justify-content: center;

    top: 300px;
    left: 0px;
}

.calendar {
    border-radius: 30px;
    padding: 15px;
    width: 95%;
    max-width: 350px;
    text-align: center;
    position: relative;
}

.calendar-month {
    font-size: 14px;
    font-weight: bold;
    color: #833C40;
    margin-bottom: 15px;
    font-family: 'Lora Regular', serif;
}

.calendar-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 10px;
}

.day-name {

    color: #A9928F;

}

.calendar-dates {

}

.date-cell {

    font-size: 14px;
    color: #5a3e2b;
    position: relative;
}

        /* ВЫДЕЛЕННАЯ ДАТА 30 */

        .swipe-hint {

            left: 0;
            right: 0;
            text-align: center;
            font-size: 14px;
            color: #833C40;
            font-family: monospace;
            opacity: 0.8;
            animation: bounce 1.5s infinite;
            pointer-events: none;
            background: transparent;
            padding: 10px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }

        /* ========== АНИМАЦИИ ПРИ СКРОЛЛЕ ========== */
/* Базовое состояние — элементы скрыты */
.scroll-animate {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94), transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

/* Состояние когда элемент появился */
.scroll-animate.show {
    opacity: 1;
    transform: translateY(0);
}

/* Небольшая задержка для разных элементов (по желанию) */
.scroll-animate.delay-1 {
    transition-delay: 0.1s;
}
.scroll-animate.delay-2 {
    transition-delay: 0.2s;
}
.scroll-animate.delay-3 {
    transition-delay: 0.35s;
}
.scroll-animate.delay-4 {
    transition-delay: 0.5s;
}

/* Альтернативная анимация — появление с масштабом (очень нежно) */
.scroll-animate.scale {
    transform: scale(0.95) translateY(20px);
}


/* ========== ДОПОЛНИТЕЛЬНЫЕ МИКРО-ЭФФЕКТЫ ========== */


/* Плавное появление футера при скролле */

@keyframes footerFadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

<script>
// ========== ПЛАВНАЯ АНИМАЦИЯ ПРИ СКРОЛЛЕ ==========
function initScrollAnimations() {
    const animatedElements = document.querySelectorAll('.scroll-animate');
    
    if (animatedElements.length === 0) return;
    
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('show');
                // Можно оставить наблюдение или отключить после появления:
                // observer.unobserve(entry.target);
            }
        });
    }, {
        threshold: 0.15,      // Элемент появится когда 15% его видно
        rootMargin: '0px 0px -20px 0px'  // Небольшой отступ снизу
    });
    
    animatedElements.forEach(el => observer.observe(el));
}

// Запускаем когда страница загрузилась
document.addEventListener('DOMContentLoaded', initScrollAnimations);
</script>
